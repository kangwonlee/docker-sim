name: Docker Base Image Simulation

on:
  workflow_dispatch:
  push:
    branches: [main]

jobs:
  simulate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Run simulation
        run: |
          VARIANTS="n ns nm nsm nsmpt"
          RESULTS_FILE="results.txt"

          echo "# Docker Base Image Simulation" | tee "$RESULTS_FILE"
          echo "Runner: $(uname -m) $(nproc) cores" | tee -a "$RESULTS_FILE"
          echo "Date: $(date -u)" | tee -a "$RESULTS_FILE"
          echo "" | tee -a "$RESULTS_FILE"

          # Import map
          import_for() {
            case "$1" in
              n)     echo "import numpy" ;;
              ns)    echo "import numpy; import scipy" ;;
              nm)    echo "import numpy; import matplotlib" ;;
              nsm)   echo "import numpy; import scipy; import matplotlib" ;;
              nsmpt) echo "import numpy; import scipy; import matplotlib; import pandas; import tabulate" ;;
            esac
          }

          DS_IMPORT="import numpy; import scipy; import matplotlib; import pandas; import tabulate; import requests; import pytest"

          # ---- Phase 1: Build base images ----
          echo "## Phase 1: Base image builds" | tee -a "$RESULTS_FILE"
          for v in $VARIANTS; do
            echo "" | tee -a "$RESULTS_FILE"
            echo "Building sim-$v ..." | tee -a "$RESULTS_FILE"

            START=$(date +%s%N)
            docker build \
              --build-arg PYPROJECT="pyproject-${v}.toml" \
              -t "sim-${v}" \
              -f base/Dockerfile.template \
              base/ 2>&1 | tail -3
            END=$(date +%s%N)
            BUILD_S=$(( (END - START) / 1000000000 ))

            SIZE=$(docker images "sim-${v}" --format "{{.Size}}" | head -1)
            echo "  sim-$v: build=${BUILD_S}s  size=${SIZE}" | tee -a "$RESULTS_FILE"
          done

          # ---- Phase 2: Base load time ----
          echo "" | tee -a "$RESULTS_FILE"
          echo "## Phase 2: Base container load time" | tee -a "$RESULTS_FILE"
          for v in $VARIANTS; do
            IMP=$(import_for "$v")
            docker run --rm "sim-${v}" python3 -c "print('warm')" > /dev/null 2>&1

            TOTAL=0
            for i in 1 2 3; do
              START=$(date +%s%N)
              docker run --rm "sim-${v}" python3 -c "$IMP" > /dev/null 2>&1
              END=$(date +%s%N)
              ELAPSED=$(( (END - START) / 1000000 ))
              TOTAL=$((TOTAL + ELAPSED))
            done
            AVG=$((TOTAL / 3))
            echo "  sim-$v: ${AVG}ms (avg of 3)" | tee -a "$RESULTS_FILE"
          done

          # ---- Phase 3: Downstream builds ----
          echo "" | tee -a "$RESULTS_FILE"
          echo "## Phase 3: Downstream builds" | tee -a "$RESULTS_FILE"
          for v in $VARIANTS; do
            echo "" | tee -a "$RESULTS_FILE"
            echo "Building ds-$v on sim-$v ..." | tee -a "$RESULTS_FILE"

            START=$(date +%s%N)
            docker build \
              --build-arg "BASE=sim-${v}" \
              -t "ds-${v}" \
              downstream/ 2>&1 | tail -3
            END=$(date +%s%N)
            BUILD_S=$(( (END - START) / 1000000000 ))

            DS_SIZE=$(docker images "ds-${v}" --format "{{.Size}}" | head -1)
            echo "  ds-$v: build=${BUILD_S}s  size=${DS_SIZE}" | tee -a "$RESULTS_FILE"
          done

          # ---- Phase 4: Downstream load time ----
          echo "" | tee -a "$RESULTS_FILE"
          echo "## Phase 4: Downstream container load time" | tee -a "$RESULTS_FILE"
          for v in $VARIANTS; do
            docker run --rm "ds-${v}" python3 -c "print('warm')" > /dev/null 2>&1

            TOTAL=0
            for i in 1 2 3; do
              START=$(date +%s%N)
              docker run --rm "ds-${v}" python3 -c "$DS_IMPORT" > /dev/null 2>&1
              END=$(date +%s%N)
              ELAPSED=$(( (END - START) / 1000000 ))
              TOTAL=$((TOTAL + ELAPSED))
            done
            AVG=$((TOTAL / 3))
            echo "  ds-$v: ${AVG}ms (avg of 3)" | tee -a "$RESULTS_FILE"
          done

          # ---- Phase 5: Compressed sizes ----
          echo "" | tee -a "$RESULTS_FILE"
          echo "## Phase 5: Compressed sizes (GHCR transfer)" | tee -a "$RESULTS_FILE"
          for v in $VARIANTS; do
            BASE_GZ=$(docker save "sim-${v}" | gzip -1 | wc -c | tr -d ' ')
            DS_GZ=$(docker save "ds-${v}" | gzip -1 | wc -c | tr -d ' ')
            BASE_MB=$((BASE_GZ / 1048576))
            DS_MB=$((DS_GZ / 1048576))
            DELTA_MB=$(( (DS_GZ - BASE_GZ) / 1048576 ))
            echo "  sim-$v: ${BASE_MB}MB  |  ds-$v: ${DS_MB}MB  |  delta: ${DELTA_MB}MB" \
              | tee -a "$RESULTS_FILE"
          done

          # ---- Phase 6: Layer delta ----
          echo "" | tee -a "$RESULTS_FILE"
          echo "## Phase 6: Layer delta (uncompressed)" | tee -a "$RESULTS_FILE"
          for v in $VARIANTS; do
            BASE_BYTES=$(docker inspect "sim-${v}" --format '{{.Size}}')
            DS_BYTES=$(docker inspect "ds-${v}" --format '{{.Size}}')
            DELTA=$(( (DS_BYTES - BASE_BYTES) / 1048576 ))
            echo "  ds-$v: +${DELTA}MB over sim-$v" | tee -a "$RESULTS_FILE"
          done

          # ---- Summary table ----
          echo "" | tee -a "$RESULTS_FILE"
          echo "## Summary" | tee -a "$RESULTS_FILE"
          echo "" | tee -a "$RESULTS_FILE"
          echo "GHCR context: base images pulled once and cached." | tee -a "$RESULTS_FILE"
          echo "Per-commit cost = DS build time + gz delta push." | tee -a "$RESULTS_FILE"

      - name: Upload results
        uses: actions/upload-artifact@v6
        if: always()
        with:
          name: simulation-results
          path: results.txt
          retention-days: 90
